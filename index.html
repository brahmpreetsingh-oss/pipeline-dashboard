<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:24px}
.header{margin-bottom:24px}
.header h1{font-size:28px;font-weight:700;color:#f8fafc}
.header p{color:#94a3b8;font-size:14px;margin-top:4px}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filters button{padding:6px 16px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:500;background:#1e293b;color:#94a3b8;transition:all .2s}
.filters button.active{background:#6366f1;color:#fff}
.filters button:hover{opacity:.85}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:#1e293b;border-radius:12px;padding:16px;border-left:4px solid #6366f1}
.kpi.us{background:rgba(59,130,246,.12);border-left-color:#3b82f6}
.kpi.uk{background:rgba(6,182,212,.12);border-left-color:#06b6d4}
.kpi.row{background:rgba(245,158,11,.12);border-left-color:#f59e0b}
.kpi-label{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.kpi-value{font-size:28px;font-weight:700;color:#f8fafc}
.kpi.us .kpi-value{color:#3b82f6}.kpi.uk .kpi-value{color:#06b6d4}.kpi.row .kpi-value{color:#f59e0b}
.kpi-sub{font-size:13px;color:#94a3b8;margin-top:2px}
.charts-row{display:grid;grid-template-columns:1fr 2fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.charts-row{grid-template-columns:1fr}}
.card{background:#1e293b;border-radius:12px;padding:16px}
.card h3{font-size:14px;color:#94a3b8;margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.funnel-row{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.funnel-label{width:160px;font-size:12px;color:#94a3b8;text-align:right;flex-shrink:0}
.funnel-bar{flex:1;height:28px;border-radius:6px;display:flex;overflow:hidden;min-width:40px;transition:width .5s}
.funnel-val{width:100px;font-size:12px;color:#cbd5e1;flex-shrink:0}
.legend{display:flex;gap:16px;margin-top:12px;justify-content:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8}
.legend-dot{width:10px;height:10px;border-radius:2px}
.table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.search{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:6px 12px;color:#e2e8f0;font-size:13px;width:220px;outline:none}
.search:focus{border-color:#6366f1}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:#94a3b8;font-weight:600;cursor:pointer;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #334155;user-select:none}
th.right{text-align:right}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.03)}
tr:nth-child(even){background:rgba(255,255,255,.02)}
.deal-name{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#f1f5f9}
.amount{text-align:right;font-weight:600;color:#f8fafc;font-variant-numeric:tabular-nums}
.geo-badge{padding:2px 10px;border-radius:10px;font-size:11px;color:#fff;font-weight:600;display:inline-block}
.geo-badge.us{background:#3b82f6}.geo-badge.uk{background:#06b6d4}.geo-badge.row{background:#f59e0b}
.pipe-badge{background:#334155;padding:2px 8px;border-radius:10px;font-size:11px;color:#94a3b8;display:inline-block}
.prob-bar{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.prob-track{width:40px;height:4px;background:#334155;border-radius:2px;overflow:hidden}
.prob-fill{height:100%;border-radius:2px}
.prob-text{font-size:11px;color:#94a3b8;width:30px;text-align:right}
.footer{text-align:center;margin-top:24px;color:#475569;font-size:12px}
.sort-icon{font-size:10px;opacity:.3}.sort-icon.active{opacity:1}
</style>
</head>

function getCat(p){if(p.includes("Net New"))return"Net New";if(p.includes("Existing New"))return"Existing New";if(p.includes("Existing Expand"))return"Existing Expand";if(p.includes("HubSpot")||p.includes("Shared"))return"HubSpot Shared";return"Other"}
function fmt(n){return n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(0)}K`:`$${n.toFixed(0)}`}
function fmtF(n){return"$"+n.toLocaleString("en-US",{maximumFractionDigits:0})}

let currentFilter="All",sortCol="amount",sortDir="desc",searchTerm="",pieChart,barChart;

function getFiltered(){
  let d=DEALS;
  if(currentFilter!=="All")d=d.filter(x=>getCat(x.pipeline)===currentFilter);
  if(searchTerm)d=d.filter(x=>x.name.toLowerCase().includes(searchTerm.toLowerCase()));
  return d;
}

function calcStats(deals){
  const s={total:{deals:deals.length,amount:0,weighted:0},byGeo:{US:{deals:0,amount:0,weighted:0},UK:{deals:0,amount:0,weighted:0},ROW:{deals:0,amount:0,weighted:0}}};
  deals.forEach(d=>{s.total.amount+=d.amount;s.total.weighted+=d.amount*d.probability;s.byGeo[d.geo].deals++;s.byGeo[d.geo].amount+=d.amount;s.byGeo[d.geo].weighted+=d.amount*d.probability});
  return s;
}

}

    <div class="kpi"><div class="kpi-label">Total Pipeline</div><div class="kpi-value">${fmt(stats.total.amount)}</div><div class="kpi-sub">${stats.total.deals} deals | Wtd: ${fmt(stats.total.weighted)}</div></div>
    <div class="kpi us"><div class="kpi-label">US</div><div class="kpi-value">${fmt(stats.byGeo.US.amount)}</div><div class="kpi-sub">${stats.byGeo.US.deals} deals | ${pct("US")}%</div></div>
    <div class="kpi uk"><div class="kpi-label">UK</div><div class="kpi-value">${fmt(stats.byGeo.UK.amount)}</div><div class="kpi-sub">${stats.byGeo.UK.deals} deals | ${pct("UK")}%</div></div>
    <div class="kpi row"><div class="kpi-label">ROW</div><div class="kpi-value">${fmt(stats.byGeo.ROW.amount)}</div><div class="kpi-sub">${stats.byGeo.ROW.deals} deals | ${pct("ROW")}%</div></div>`;
}

function renderPie(stats){
  const ctx=document.getElementById("pieChart").getContext("2d");
  const data=["US","UK","ROW"].map(g=>stats.byGeo[g].amount);
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(ctx,{type:"doughnut",data:{labels:["US","UK","ROW"],datasets:[{data,backgroundColor:[GC.US,GC.UK,GC.ROW],borderWidth:0}]},options:{responsive:true,plugins:{legend:{labels:{color:"#94a3b8",font:{size:12}}},tooltip:{callbacks:{label:c=>` ${c.label}: ${fmtF(c.raw)} (${((c.raw/data.reduce((a,b)=>a+b,0))*100).toFixed(1)}%)`}}},cutout:"55%"}});
}

function renderBar(deals){
  const ctx=document.getElementById("barChart").getContext("2d");
  const cats=["Net New","Existing New","Existing Expand","HubSpot Shared"];
  const us=[],uk=[],row=[];
  cats.forEach(c=>{const f=deals.filter(d=>getCat(d.pipeline)===c);us.push(f.filter(d=>d.geo==="US").reduce((s,d)=>s+d.amount,0));uk.push(f.filter(d=>d.geo==="UK").reduce((s,d)=>s+d.amount,0));row.push(f.filter(d=>d.geo==="ROW").reduce((s,d)=>s+d.amount,0))});
  if(barChart)barChart.destroy();
  barChart=new Chart(ctx,{type:"bar",data:{labels:cats,datasets:[{label:"US",data:us,backgroundColor:GC.US},{label:"UK",data:uk,backgroundColor:GC.UK},{label:"ROW",data:row,backgroundColor:GC.ROW}]},options:{responsive:true,scales:{x:{stacked:true,ticks:{color:"#94a3b8",font:{size:11}},grid:{display:false}},y:{stacked:true,ticks:{color:"#94a3b8",font:{size:11},callback:v=>fmt(v)},grid:{color:"rgba(255,255,255,.05)"}}},plugins:{legend:{labels:{color:"#94a3b8",font:{size:12}}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmtF(c.raw)}`}}}}});
}

function renderFunnel(deals){
  const el=document.getElementById("funnel");
  const stageData=STAGES.map(st=>{const sd=deals.filter(d=>d.stage===st);return{name:st,total:sd.reduce((s,d)=>s+d.amount,0),count:sd.length,us:sd.filter(d=>d.geo==="US").reduce((s,d)=>s+d.amount,0),uk:sd.filter(d=>d.geo==="UK").reduce((s,d)=>s+d.amount,0),row:sd.filter(d=>d.geo==="ROW").reduce((s,d)=>s+d.amount,0)}}).filter(x=>x.count>0);
  const max=Math.max(...stageData.map(s=>s.total),1);
  el.innerHTML=stageData.map(s=>{
    const w=Math.max((s.total/max)*100,8);const t=s.total||1;
    return`<div class="funnel-row"><div class="funnel-label">${s.name}</div><div style="flex:1"><div class="funnel-bar" style="width:${w}%">${s.us>0?`<div style="width:${(s.us/t)*100}%;background:${GC.US};height:100%"></div>`:""}${s.uk>0?`<div style="width:${(s.uk/t)*100}%;background:${GC.UK};height:100%"></div>`:""}${s.row>0?`<div style="width:${(s.row/t)*100}%;background:${GC.ROW};height:100%"></div>`:""}</div></div><div class="funnel-val">${fmt(s.total)} (${s.count})</div></div>`;
  }).join("");
}

function renderTable(deals){
  const sorted=[...deals].sort((a,b)=>{let va=a[sortCol],vb=b[sortCol];if(typeof va==="string"){va=va.toLowerCase();vb=vb.toLowerCase()}return sortDir==="asc"?(va<vb?-1:va>vb?1:0):(va>vb?-1:va<vb?1:0)});
  const cols=[["name","Deal","left"],["amount","Amount","right"],["stage","Stage","left"],["pipeline","Pipeline","left"],["geo","Geo","left"],["probability","Prob","right"],["closedate","Close","left"]];
  const si=(c)=>sortCol===c?(sortDir==="asc"?"↑":"↓"):"⇕";
  const sic=(c)=>sortCol===c?"active":"";
  document.getElementById("tableHead").innerHTML=cols.map(([c,l,a])=>`<th class="${a==="right"?"right":""}" onclick="setSort('${c}')">${l} <span class="sort-icon ${sic(c)}">${si(c)}</span></th>`).join("");
  document.getElementById("tableTitle").textContent=`DEAL TABLE (${sorted.length} deals)`;
  const show=sorted.slice(0,50);
  document.getElementById("tableBody").innerHTML=show.map((d,i)=>{
    const probColor=d.probability>=.8?"#22c55e":d.probability>=.4?"#eab308":"#ef4444";
    return`<tr><td class="deal-name">${d.name}</td><td class="amount">${d.amount>1?fmtF(d.amount):"-"}</td><td style="color:#cbd5e1">${d.stage}</td><td><span class="pipe-badge">${getCat(d.pipeline)}</span></td><td><span class="geo-badge ${d.geo.toLowerCase()}">${d.geo}</span></td><td><div class="prob-bar"><div class="prob-track"><div class="prob-fill" style="width:${d.probability*100}%;background:${probColor}"></div></div><span class="prob-text">${(d.probability*100).toFixed(0)}%</span></div></td><td style="color:#94a3b8;font-size:12px">${d.closedate||"-"}</td></tr>`;
  }).join("");
  const sm=document.getElementById("showMore");
  if(sorted.length>50){sm.textContent=`Showing 50 of ${sorted.length} deals`;sm.style.display="block"}else{sm.style.display="none"}
}

function render(){
  const deals=getFiltered();const stats=calcStats(deals);
  renderFilters();renderKPIs(stats);renderPie(stats);renderBar(deals);renderFunnel(deals);renderTable(deals);
}

window.setFilter=function(f){currentFilter=f;render()};
window.setSort=function(c){if(sortCol===c)sortDir=sortDir==="asc"?"desc":"asc";else{sortCol=c;sortDir="desc"}render()};
document.getElementById("search").addEventListener("input",e=>{searchTerm=e.target.value;render()});

render();
</script>
</body>
</html>
